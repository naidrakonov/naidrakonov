<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>Определение устройства</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        #deviceType {
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Определение типа устройства</h1>
    <div id="deviceType">Проверка устройства...</div>

<ul>
<li><a href="https://naidrakonov.github.io/naidrakonov/apps.html">Приложение</a></li>
<li><a href="https://naidrakonov.github.io/naidrakonov/nd_notes.html">Заметки</a></li>
<li><a href="https://naidrakonov.github.io/naidrakonov/color.html">Палитра</a></li>
<li><a href="https://naidrakonov.github.io/naidrakonov/GenColor.html">Генератор цвета</a></li>
<li><a href="https://naidrakonov.github.io/naidrakonov/ConReg.html">Конвектор регистров</a></li>
<li><a href="https://naidrakonov.github.io/naidrakonov/analiz.html">Анализ</a></li>
<li><a href="https://naidrakonov.github.io/naidrakonov/ocr.html">Округлить фото</a></li>

</ul>

<h1><a href="https://teletype.in/@naidrakonov/menu">Псевдосайт</a></h1>

    <script>
        function detectDevice() {
            const userAgent = navigator.userAgent;
            const deviceTypeElement = document.getElementById('deviceType');

            if (/mobile/i.test(userAgent)) {
                deviceTypeElement.textContent = "Это мобильное устройство";
            } else {
                deviceTypeElement.textContent = "Это компьютер";
            }
        }

        // Вызов функции для определения типа устройства
        detectDevice();
    </script>
</body>
</html>
